# coturn — STUN + TURN for 1:1 WebRTC calls (dev config)
#
# STUN: reflects the client's public IP:port back to it (used to build
#       "server-reflexive" ICE candidates). Nearly free to operate.
# TURN: full media relay for when direct P2P fails (symmetric NAT / strict
#       firewalls). Expensive (all bytes flow through it) — which is why ICE
#       tries host candidates, then STUN, and TURN only as last resort.

listening-port=3478
fingerprint

# Static long-term credentials — fine for dev. Production uses time-limited
# HMAC credentials (use-auth-secret) minted by the API per call, so leaked
# creds expire and you can attribute relay usage per user.
lt-cred-mech
user=collab:collab_turn_pw
realm=unified-collab.local

# Relay port range — matches what the container exposes.
min-port=49152
max-port=65535

# Dev-only loosening; NEVER in production:
no-tls
no-dtls
verbose
